# ============================================================
#  SisIncidentes — Perfil de Desenvolvimento (dev)
# ============================================================

# JPA — exibe SQL gerado no console (útil para depuração)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 Console habilitado no dev
spring.h2.console.enabled=true

# Nível de log detalhado
logging.level.com.seguranca.sisincidentes=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.springframework.security=DEBUG

# Mensagem de boas-vindas no startup
spring.banner.location=classpath:banner.txt
