# ============================================================
#  SisIncidentes — Configuração de Produção
# ============================================================

# JWT Security
# Em ambiente de PROD, a chave secreta DEVE ser fornecida via variável de ambiente.
# Se não houver, utiliza um fallback apenas para evitar falha no boot (NÃO RECOMENDADO).
api.security.token.secret=${JWT_SECRET:CHAVE_DE_PRODUCAO_SUPER_SECRETA_E_LONGA_SIS_INCIDENTES_2024}
api.security.token.expiration-ms=3600000

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# Segurança estrita
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=true
