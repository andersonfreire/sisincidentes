# ============================================================
#  SisIncidentes — Perfil de Produção (prod)
# ============================================================

# JPA — sem exibição de SQL em produção
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# H2 Console desabilitado em produção
spring.h2.console.enabled=false

# Nível de log reduzido
logging.level.com.seguranca.sisincidentes=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.org.springframework.security=WARN

# Em produção, a estrutura do banco não é recriada a cada reinício
spring.jpa.hibernate.ddl-auto=validate
